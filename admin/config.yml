backend:
  name: github
  repo: thegoatzzbad02-blip/PAGINApRUEBA
  branch: main
  base_url: https://pagin-ap-rueba-9lyii86op-thegoatzzbad02-blips-projects.vercel.app

media_folder: "static/uploads"
public_folder: "/uploads"

collections:
  - name: "configuracion"
    label: "Configuración General"
    files:
      - name: "general"
        label: "Datos de Contacto"
        file: "_data/configuracion.yml"
        fields:
          - { label: "Teléfono", name: "telefono", widget: "string" }
          - { label: "Email", name: "email", widget: "string" }
          - { label: "Dirección", name: "direccion", widget: "text" }
          - { label: "Horario", name: "horario", widget: "string" }
          - { label: "WhatsApp URL", name: "whatsapp_url", widget: "string" }

  - name: "emprendedores"
    label: "Emprendedores"
    files:
      - name: "lista-emprendedores"
        label: "Lista de Emprendedores"
        file: "_data/emprendedores.yml"
        fields:
          - label: "Emprendedores"
            name: "emprendedores"
            widget: "list"
            summary: "{{fields.nombre}}"
            fields:
              - { label: "Nombre", name: "nombre", widget: "string" }
              - { label: "Imagen", name: "imagen", widget: "image", required: false }
              - { label: "Descripción", name: "descripcion", widget: "text" }
              - { label: "Teléfono", name: "telefono", widget: "string", required: false }
              - { label: "WhatsApp", name: "whatsapp", widget: "string", required: false }
              - { label: "Instagram", name: "instagram", widget: "string", required: false }
              - { label: "Facebook", name: "facebook", widget: "string", required: false }

  - name: "noticias"
    label: "Noticias"
    folder: "_posts/noticias"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "Título", name: "title", widget: "string" }
      - { label: "Fecha", name: "date", widget: "datetime" }
      - { label: "Categoría", name: "categoria", widget: "string" }
      - { label: "Imagen destacada", name: "imagen", widget: "image", required: false }
      - { label: "Resumen", name: "resumen", widget: "text", required: false }
      - { label: "Contenido", name: "body", widget: "markdown" }

  - name: "alertas"
    label: "Alertas"
    files:
      - name: "lista-alertas"
        label: "Lista de Alertas"
        file: "_data/alertas.yml"
        fields:
          - label: "Alertas"
            name: "alertas"
            widget: "list"
            fields:
              - { label: "Título", name: "titulo", widget: "string" }
              - { label: "Descripción", name: "descripcion", widget: "text" }
              - { label: "Tipo", name: "tipo", widget: "select", options: ["urgente", "info", "evento"] }
              - { label: "Fecha", name: "fecha", widget: "datetime" }

  - name: "eventos"
    label: "Eventos"
    files:
      - name: "lista-eventos"
        label: "Lista de Eventos"
        file: "_data/eventos.yml"
        fields:
          - label: "Eventos"
            name: "eventos"
            widget: "list"
            fields:
              - { label: "Título", name: "titulo", widget: "string" }
              - { label: "Fecha y hora", name: "fecha_hora", widget: "datetime" }
              - { label: "Lugar", name: "lugar", widget: "string" }
              - { label: "Descripción", name: "descripcion", widget: "text" }

  - name: "servicios"
    label: "Servicios Públicos"
    files:
      - name: "estado-servicios"
        label: "Estado de Servicios"
        file: "_data/servicios.yml"
        fields:
          - label: "Agua"
            name: "agua"
            widget: "object"
            fields:
              - { label: "Estado", name: "estado", widget: "select", options: ["deficiente", "regular", "critico", "optimo"] }
              - { label: "Texto adicional", name: "texto", widget: "text", required: false }
          - label: "Electricidad"
            name: "electricidad"
            widget: "object"
            fields:
              - { label: "Estado", name: "estado", widget: "select", options: ["deficiente", "regular", "critico", "optimo"] }
              - { label: "Texto adicional", name: "texto", widget: "text", required: false }
          - label: "Aseo"
            name: "aseo"
            widget: "object"
            fields:
              - { label: "Estado", name: "estado", widget: "select", options: ["deficiente", "regular", "critico", "optimo"] }
              - { label: "Texto adicional", name: "texto", widget: "text", required: false }
          - label: "Internet"
            name: "internet"
            widget: "object"
            fields:
              - { label: "Estado", name: "estado", widget: "select", options: ["deficiente", "regular", "critico", "optimo"] }
              - { label: "Texto adicional", name: "texto", widget: "text", required: false }
          - label: "Gestiones"
            name: "gestiones"
            widget: "list"
            summary: "{{fields.fecha}} - {{fields.descripcion}}"
            fields:
              - { label: "Fecha", name: "fecha", widget: "date" }
              - { label: "Descripción", name: "descripcion", widget: "text" }