<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Noticia - Villa Rosario</title>
    <link rel="stylesheet" href="css/estilo.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="navbar">...</nav>

    <main>
        <div class="container" style="max-width: 900px; margin: 2rem auto;">
            <div id="noticia-completa"></div>
            <div class="compartir-noticia">
                <span class="compartir-titulo"><i class="fas fa-share-alt"></i> Compartir:</span>
                <div class="compartir-botones">
                    <a href="#" id="share-wsp" class="compartir-btn compartir-wsp"><i class="fab fa-whatsapp"></i> WhatsApp</a>
                    <a href="#" id="share-fb" class="compartir-btn compartir-fb"><i class="fab fa-facebook-f"></i> Facebook</a>
                    <a href="#" id="share-tw" class="compartir-btn compartir-tw"><i class="fab fa-twitter"></i> Twitter</a>
                    <button id="copy-link" class="compartir-btn compartir-copy"><i class="fas fa-link"></i> Copiar enlace</button>
                </div>
                <div id="copyMessage" class="copy-message">¡Enlace copiado!</div>
            </div>
        </div>
    </main>

    <footer class="footer">...</footer>

    <script src="https://cdn.jsdelivr.net/npm/js-yaml@4/dist/js-yaml.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
